name: k3-syntax

on:
  push:
  pull_request:

jobs:
  k3-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile K3 candidate scripts
        run: |
          python -m py_compile chronos/k3/experiments/k3_0d_sine_gordon_winding_density.py
          python -m py_compile chronos/k3/experiments/k3_1_winding_density_prior.py
          python -m py_compile chronos/k3/experiments/k3_2d_0_vortex_regime.py
          python -m py_compile chronos/k3/archives/exp_k3_1_main/k3_1_main.py
