name: docs

on:
  push:
  pull_request:

jobs:
  docs-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e k1-manifold-core
      - run: python k1-manifold-core/docs/examples/basic_2d_example.py
