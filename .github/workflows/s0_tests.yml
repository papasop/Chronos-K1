name: s0-tests

on:
  push:
  pull_request:

jobs:
  s0-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run S0 structure-selector tests
        run: python -m unittest chronos.s0.tests.test_structure_selector
